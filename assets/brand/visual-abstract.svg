<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" font-family="Inter, system-ui, -apple-system, sans-serif">
  <!-- srbf visual abstract: (datasets x methods) -> srbf -> curves / table / ranks.
       System-adaptive: colors switch with prefers-color-scheme. Balanced grid: 48px outer
       margins, 72px arrow gaps, content band y 80..276 in every column. -->
  <style>
    .bg     { fill: #ffffff; stroke: #e6e8f0; }
    .panel  { fill: #f6f7fb; stroke: #e6e8f0; }
    .panel2 { fill: #eef0fe; stroke: #dfe3fc; }
    .cell   { fill: #ffffff; stroke: #e6e8f0; }
    .ink    { fill: #12141c; }
    .soft   { fill: #4a4f5e; }
    .faint  { fill: #868c9c; }
    .accent { fill: #4f46e5; }
    .accent-stroke { stroke: #4f46e5; }
    .grid   { stroke: #d7dae4; }
    .grey   { fill: #9aa1b4; }
    .grey-stroke { stroke: #9aa1b4; }
    @media (prefers-color-scheme: dark) {
      .bg     { fill: #0c0e14; stroke: #232838; }
      .panel  { fill: #151824; stroke: #232838; }
      .panel2 { fill: #1c2136; stroke: #2a3050; }
      .cell   { fill: #10131c; stroke: #232838; }
      .ink    { fill: #eef0f6; }
      .soft   { fill: #b7bdcc; }
      .faint  { fill: #7c8397; }
      .accent { fill: #8b8bff; }
      .accent-stroke { stroke: #8b8bff; }
      .grid   { stroke: #333a4f; }
      .grey   { fill: #65788a; }
      .grey-stroke { stroke: #65788a; }
    }
  </style>
  <rect class="bg" x="1" y="1" width="1198" height="318" rx="18" stroke-width="2"/>

  <!-- phase captions -->
  <text class="ink" x="193" y="58" text-anchor="middle" font-size="15" font-weight="700">Any datasets &#215; any methods</text>
  <text class="ink" x="525" y="58" text-anchor="middle" font-size="15" font-weight="700">One framework</text>
  <text class="ink" x="932" y="58" text-anchor="middle" font-size="15" font-weight="700">Explore &amp; compare</text>

  <!-- left: datasets x methods -->
  <rect class="panel" x="48" y="80" width="290" height="78" rx="12"/>
  <text class="accent" x="70" y="106" font-size="11.5" font-weight="700" letter-spacing="1.4">DATASETS</text>
  <text class="ink" x="70" y="127" font-size="13">One formalism, any source:</text>
  <text class="soft" x="70" y="145" font-size="13">FastSRB &#183; v23-val &#183; your own</text>

  <text class="accent" x="193" y="185" text-anchor="middle" font-size="23" font-weight="600">&#215;</text>

  <rect class="panel" x="48" y="198" width="290" height="78" rx="12"/>
  <text class="accent" x="70" y="224" font-size="11.5" font-weight="700" letter-spacing="1.4">METHODS</text>
  <text class="ink" x="70" y="245" font-size="13">One adapter interface:</text>
  <text class="soft" x="70" y="263" font-size="13">Flash-ANSR &#183; PySR &#183; NeSymReS &#183; E2E</text>

  <!-- arrow -->
  <path class="accent-stroke" d="M356 178 h33" stroke-width="2.5" fill="none"/>
  <path class="accent" d="M385 171 l12 7 -12 7 z"/>

  <!-- middle: the srbf logo + core aspects -->
  <rect class="panel2" x="410" y="80" width="230" height="196" rx="14"/>
  <g transform="translate(475, 96) scale(0.1953)">
    <rect width="512" height="512" rx="116" fill="#4f46e5"/>
    <g transform="translate(71.68,312.71) scale(0.157538,-0.157538)">
      <path fill="#ffffff" d="M278.0 -9Q183.0 -9 129.0 34.0Q75.0 77 75.0 154H182.0Q182.0 119 207.0 99.5Q232.0 80 278.0 80H322.0Q369.0 80 395.0 99.5Q421.0 119 421.0 155Q421.0 218 354.0 227L209.0 247Q148.0 255 114.5 295.5Q81.0 336 81.0 401Q81.0 476 132.0 517.5Q183.0 559 276.0 559H321.0Q407.0 559 460.5 518.0Q514.0 477 517.0 410H409.0Q407.0 437 383.5 454.5Q360.0 472 321.0 472H276.0Q233.0 472 209.5 453.0Q186.0 434 186.0 402Q186.0 351 243.0 343L379.0 325Q526.0 305 526.0 156Q526.0 77 473.0 34.0Q420.0 -9 322.0 -9Z M684.0 0V550H791.0V442Q799.0 497 838.0 528.5Q877.0 560 941.0 560Q1026.0 560 1073.0 507.0Q1120.0 454 1120.0 358V309H1012.0V355Q1012.0 466 903.0 466Q849.0 466 820.5 434.5Q792.0 403 792.0 343V0Z M1501.0 -10Q1441.0 -10 1401.5 20.0Q1362.0 50 1351.0 104V0H1244.0V730H1352.0V573L1349.0 446Q1361.0 499 1401.5 529.5Q1442.0 560 1501.0 560Q1583.0 560 1632.0 504.0Q1681.0 448 1681.0 352V197Q1681.0 102 1632.0 46.0Q1583.0 -10 1501.0 -10ZM1463.0 84Q1515.0 84 1544.0 111.5Q1573.0 139 1573.0 200V351Q1573.0 411 1544.0 438.5Q1515.0 466 1463.0 466Q1411.0 466 1381.5 434.5Q1352.0 403 1352.0 346V205Q1352.0 147 1381.5 115.5Q1411.0 84 1463.0 84Z M1948.0 0V377H1792.0V475H1948.0V581Q1948.0 650 1992.0 690.0Q2036.0 730 2112.0 730H2273.0V634H2114.0Q2056.0 634 2056.0 580V475H2273.0V377H2056.0V0Z"/>
    </g>
  </g>
  <text class="ink" x="525" y="224" text-anchor="middle" font-size="12.5">unified dataset formalism</text>
  <text class="ink" x="525" y="246" text-anchor="middle" font-size="12.5">decontamination built in</text>
  <text class="ink" x="525" y="268" text-anchor="middle" font-size="12.5">paired, pre-declared statistics</text>

  <!-- arrow -->
  <path class="accent-stroke" d="M658 178 h33" stroke-width="2.5" fill="none"/>
  <path class="accent" d="M687 171 l12 7 -12 7 z"/>

  <!-- right: three view glyphs -->
  <!-- curves -->
  <rect class="panel" x="712" y="80" width="136" height="168" rx="12"/>
  <path class="accent" d="M730 212 C 760 210, 770 152, 830 130 L 830 150 C 780 166, 764 214, 730 220 Z" opacity="0.16"/>
  <path class="accent-stroke" d="M730 216 C 760 214, 770 160, 830 140" stroke-width="2.5" fill="none"/>
  <path class="grey-stroke" d="M730 224 C 768 224, 790 200, 830 188" stroke-width="2.5" fill="none"/>
  <line class="grid" x1="726" y1="100" x2="726" y2="228" stroke-width="1.5"/>
  <line class="grid" x1="726" y1="228" x2="834" y2="228" stroke-width="1.5"/>
  <text class="soft" x="780" y="272" text-anchor="middle" font-size="13.5" font-weight="600">Curves</text>

  <!-- table -->
  <rect class="panel" x="864" y="80" width="136" height="168" rx="12"/>
  <rect class="accent" x="882" y="112" width="100" height="20" rx="4" opacity="0.16"/>
  <rect class="cell" x="882" y="132" width="100" height="78"/>
  <line class="grid" x1="882" y1="158" x2="982" y2="158" stroke-width="1.2"/>
  <line class="grid" x1="882" y1="184" x2="982" y2="184" stroke-width="1.2"/>
  <line class="grid" x1="918" y1="112" x2="918" y2="210" stroke-width="1.2"/>
  <line class="grid" x1="952" y1="112" x2="952" y2="210" stroke-width="1.2"/>
  <circle class="accent" cx="900" cy="145" r="3.4"/>
  <circle class="grey" cx="900" cy="171" r="3.4"/>
  <circle class="grey" cx="900" cy="197" r="3.4"/>
  <rect class="grey" x="928" y="141" width="16" height="7" rx="2" opacity="0.75"/>
  <rect class="grey" x="928" y="167" width="16" height="7" rx="2" opacity="0.55"/>
  <rect class="grey" x="928" y="193" width="16" height="7" rx="2" opacity="0.4"/>
  <rect class="grey" x="962" y="141" width="12" height="7" rx="2" opacity="0.75"/>
  <rect class="grey" x="962" y="167" width="12" height="7" rx="2" opacity="0.55"/>
  <rect class="grey" x="962" y="193" width="12" height="7" rx="2" opacity="0.4"/>
  <text class="soft" x="932" y="272" text-anchor="middle" font-size="13.5" font-weight="600">Table</text>

  <!-- ranks -->
  <rect class="panel" x="1016" y="80" width="136" height="168" rx="12"/>
  <rect class="accent-stroke" x="1032" y="128" width="46" height="26" rx="7" fill="#4f46e5" fill-opacity="0.12" stroke-opacity="0.4"/>
  <circle class="accent" cx="1044" cy="141" r="5.5"/>
  <circle class="accent-stroke" cx="1065" cy="141" r="5.5" fill="none" stroke-width="2.5"/>
  <circle class="grey" cx="1102" cy="141" r="5.5"/>
  <circle cx="1130" cy="141" r="5.5" fill="#f97316"/>
  <line class="grid" x1="1032" y1="178" x2="1138" y2="178" stroke-width="1.5"/>
  <text class="faint" x="1032" y="198" font-size="10.5">1</text>
  <text class="faint" x="1131" y="198" font-size="10.5">k</text>
  <text class="faint" x="1085" y="218" text-anchor="middle" font-size="10.5">mean rank</text>
  <text class="soft" x="1084" y="272" text-anchor="middle" font-size="13.5" font-weight="600">Ranks</text>
</svg>
