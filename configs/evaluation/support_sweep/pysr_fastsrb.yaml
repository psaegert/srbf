run:
  data_source:
    catalog: fastsrb
    sampling:
      n_support: !sweep
        name: ladder
        values: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048]
      n_validation: 512
      noise: 0.0
      problems_per_expression: 10
  model_adapter:
    type: pysr
    timeout_in_seconds: 3600
    niterations: 128
    padding: false
    use_mult_div_operators: false
    simplipy_engine: dev_7-3
  runner:
    limit: null
    save_every: 4
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_00001.pkl', '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_00002.pkl', '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_00004.pkl',
        '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_00008.pkl', '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_00016.pkl', '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_00032.pkl', '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_00064.pkl',
        '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_00128.pkl', '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_00256.pkl', '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_00512.pkl', '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_01024.pkl',
        '{{ROOT}}/results/evaluation/support_sweep/pysr/fastsrb/support_02048.pkl']
