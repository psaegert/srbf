run:
  data_source:
    catalog: v23-val
    sampling:
      n_support: !sweep
        name: ladder
        values: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048]
      n_validation: 512
      noise: 0.0
      problems_per_expression: 10
    target_size: 1000
  model_adapter:
    type: e2e
    model_path: '{{ROOT}}/models/e2e/model1.pt'
    simplipy_engine: dev_7-3
    device: cuda
    candidates_per_bag: 256
    max_input_points: 200
    max_number_bags: 100
    n_trees_to_refine: 10
    rescale: true
  runner:
    limit: null
    save_every: 64
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_00001.pkl', '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_00002.pkl', '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_00004.pkl', '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_00008.pkl',
        '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_00016.pkl', '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_00032.pkl', '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_00064.pkl', '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_00128.pkl',
        '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_00256.pkl', '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_00512.pkl', '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_01024.pkl', '{{ROOT}}/results/evaluation/support_sweep/e2e/val/support_02048.pkl']
