run:
  data_source:
    catalog: v23-val
    sampling:
      n_support: 512
      n_validation: 512
      noise: !sweep
        name: ladder
        values: [0.0, 0.001, 0.01, 0.1]
      problems_per_expression: 10
    target_size: 1000
  model_adapter:
    type: pysr
    timeout_in_seconds: 3600
    niterations: 128
    padding: false
    use_mult_div_operators: false
    simplipy_engine: dev_7-3
  runner:
    limit: null
    save_every: 4
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/noise_sweep/pysr/val/noise_0p000.pkl', '{{ROOT}}/results/evaluation/noise_sweep/pysr/val/noise_0p001.pkl', '{{ROOT}}/results/evaluation/noise_sweep/pysr/val/noise_0p010.pkl', '{{ROOT}}/results/evaluation/noise_sweep/pysr/val/noise_0p100.pkl']
