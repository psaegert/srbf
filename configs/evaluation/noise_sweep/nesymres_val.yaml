run:
  data_source:
    catalog: v23-val
    sampling:
      n_support: 512
      n_validation: 512
      noise: !sweep
        name: ladder
        values: [0.0, 0.001, 0.01, 0.1]
      problems_per_expression: 10
    target_size: 1000
  model_adapter:
    type: nesymres
    eq_setting_path: '{{ROOT}}/models/nesymres/eq_setting.json'
    config_path: '{{ROOT}}/models/nesymres/config.yaml'
    weights_path: '{{ROOT}}/models/nesymres/100M.ckpt'
    simplipy_engine: dev_7-3
    n_restarts: 4
    device: cuda
    remove_padding: true
    beam_width: 4
  runner:
    limit: null
    save_every: 32
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/noise_sweep/nesymres/val/noise_0p000.pkl', '{{ROOT}}/results/evaluation/noise_sweep/nesymres/val/noise_0p001.pkl', '{{ROOT}}/results/evaluation/noise_sweep/nesymres/val/noise_0p010.pkl', '{{ROOT}}/results/evaluation/noise_sweep/nesymres/val/noise_0p100.pkl']
