run:
  data_source:
    catalog: fastsrb
    sampling:
      n_support: 512
      n_validation: 512
      noise: !sweep
        name: ladder
        values: [0.0, 0.001, 0.01, 0.1]
      problems_per_expression: 10
  model_adapter:
    config_provenance: upstream_default
    type: e2e
    model_path: '{{ROOT}}/models/e2e/model1.pt'
    simplipy_engine: dev_7-3
    device: cuda
    candidates_per_bag: 256
    max_input_points: 200
    max_number_bags: 100
    n_trees_to_refine: 10
    rescale: true
  runner:
    limit: null
    save_every: 64
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/noise_sweep/e2e/fastsrb/noise_0p000.pkl', '{{ROOT}}/results/evaluation/noise_sweep/e2e/fastsrb/noise_0p001.pkl', '{{ROOT}}/results/evaluation/noise_sweep/e2e/fastsrb/noise_0p010.pkl', '{{ROOT}}/results/evaluation/noise_sweep/e2e/fastsrb/noise_0p100.pkl']
