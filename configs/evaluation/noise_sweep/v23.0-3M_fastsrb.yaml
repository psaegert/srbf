run:
  data_source:
    catalog: fastsrb
    sampling:
      n_support: 512
      n_validation: 512
      noise: !sweep
        name: ladder
        values: [0.0, 0.001, 0.01, 0.1]
      problems_per_expression: 10
  model_adapter:
    config_provenance: author_blessed
    type: flash_ansr
    model_path: '{{ROOT}}/models/ansr-models/v23.0-3M'
    evaluation_config:
      n_support: 512
      n_restarts: 8
      refiner_method: curve_fit_lm
      refiner_p0_noise: normal
      refiner_p0_noise_kwargs:
        loc: 0.0
        scale: 5
      length_penalty: 0.05
      constants_penalty: 0.0
      likelihood_penalty: 0.0
      prune_constant_budget: 0
      generation_config:
        method: softmax_sampling
        kwargs:
          choices: 4069
          top_k: 0
          top_p: 1
          max_len: 64
          batch_size: 128
          temperature: 1
          valid_only: true
          simplify: true
          unique: true
      device: cuda
    complexity: none
    device: cuda
  runner:
    limit: null
    save_every: 64
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/noise_sweep/v23.0-3M/fastsrb/noise_0p000.pkl', '{{ROOT}}/results/evaluation/noise_sweep/v23.0-3M/fastsrb/noise_0p001.pkl', '{{ROOT}}/results/evaluation/noise_sweep/v23.0-3M/fastsrb/noise_0p010.pkl',
        '{{ROOT}}/results/evaluation/noise_sweep/v23.0-3M/fastsrb/noise_0p100.pkl']
