run:
  data_source:
    catalog: fastsrb
    sampling:
      n_support: 512
      n_validation: 512
      noise: 0.0
      problems_per_expression: 10
  model_adapter:
    config_provenance: author_blessed
    type: flash_ansr
    model_path: '{{ROOT}}/models/ansr-models/v23.0-120M'
    evaluation_config:
      n_support: 512
      n_restarts: 8
      refiner_method: curve_fit_lm
      refiner_p0_noise: normal
      refiner_p0_noise_kwargs:
        loc: 0.0
        scale: 5
      length_penalty: 0.05
      constants_penalty: 0.0
      likelihood_penalty: 0.0
      prune_constant_budget: 0
      generation_config:
        method: beam_search
        kwargs:
          beam_width: 32
          max_len: 64
          batch_size: 128
          unique: true
      device: cuda
    complexity: none
    device: cuda
    generation_overrides:
      kwargs:
        beam_width: !sweep
          name: ladder
          values: [1, 4, 16, 64, 256, 1024]
  runner:
    limit: null
    save_every: 64
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/scaling/v23.0-120M-Z2-beam/fastsrb/beam_search_00001.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-120M-Z2-beam/fastsrb/beam_search_00004.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-120M-Z2-beam/fastsrb/beam_search_00016.pkl',
        '{{ROOT}}/results/evaluation/scaling/v23.0-120M-Z2-beam/fastsrb/beam_search_00064.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-120M-Z2-beam/fastsrb/beam_search_00256.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-120M-Z2-beam/fastsrb/beam_search_01024.pkl']
