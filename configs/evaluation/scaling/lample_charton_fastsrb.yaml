run:
  data_source:
    catalog: fastsrb
    sampling:
      n_support: 512
      n_validation: 512
      noise: 0.0
      problems_per_expression: !sweep
        name: ladder
        values: [10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 5, 5]
  model_adapter:
    config_provenance: harness_tuned
    type: lample_charton
    simplipy_engine: dev_7-3
    samples: !sweep
      name: ladder
      values: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048, 4096, 8192, 16384, 65536, 262144]
    unique: true
    ignore_holdouts: true
    seed: 42
    n_restarts: 8
    refiner_method: curve_fit_lm
    refiner_p0_noise: normal
    refiner_p0_noise_kwargs:
      loc: 0.0
      scale: 5
    numpy_errors: ignore
    length_penalty: 0.05
    constants_penalty: 0.0
    likelihood_penalty: 0.0
    catalog: lample-charton-v23
  runner:
    limit: null
    save_every: 64
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_00001.pkl', '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_00002.pkl', '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_00004.pkl',
        '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_00008.pkl', '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_00016.pkl', '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_00032.pkl',
        '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_00064.pkl', '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_00128.pkl', '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_00256.pkl',
        '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_00512.pkl', '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_01024.pkl', '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_02048.pkl',
        '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_04096.pkl', '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_08192.pkl', '{{ROOT}}/results/evaluation/scaling/lample_charton/fastsrb/samples_16384.pkl',
