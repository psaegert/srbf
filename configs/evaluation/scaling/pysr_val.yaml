run:
  data_source:
    catalog: v23-val
    sampling:
      n_support: 512
      n_validation: 512
      noise: 0.0
      problems_per_expression: !sweep
        name: ladder
        values: [10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 5, 5]
    target_size: !sweep
      name: ladder
      values: [1000, 1000, 1000, 1000, 1000, 1000, 1000, 1000, 1000, 1000, 1000, 500, 500]
  model_adapter:
    config_provenance: upstream_default
    type: pysr
    timeout_in_seconds: !sweep
      name: ladder
      values: [3600, 3600, 3600, 3600, 3600, 3600, 3600, 3600, 3600, 3600, 3600, 10000, 10000]
    niterations: !sweep
      name: ladder
      values: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 4096, 16384]
    padding: false
    use_mult_div_operators: false
    simplipy_engine: dev_7-3
  runner:
    limit: null
    save_every: !sweep
      name: ladder
      values: [4, 4, 4, 4, 4, 4, 4, 4, 4, 4, 4, 1, 1]
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/scaling/pysr/val/niter_00001.pkl', '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_00002.pkl', '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_00004.pkl', '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_00008.pkl',
        '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_00016.pkl', '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_00032.pkl', '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_00064.pkl', '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_00128.pkl',
        '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_00256.pkl', '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_00512.pkl', '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_01024.pkl', '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_04096.pkl',
        '{{ROOT}}/results/evaluation/scaling/pysr/val/niter_16384.pkl']
