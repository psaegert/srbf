run:
  data_source:
    catalog: fastsrb
    sampling:
      n_support: 512
      n_validation: 512
      noise: 0.0
      problems_per_expression: !sweep
        name: ladder
        values: [10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 5, 5]
  model_adapter:
    type: flash_ansr
    model_path: '{{ROOT}}/models/ansr-models/v23.0-3M'
    evaluation_config:
      n_support: 512
      n_restarts: 8
      refiner_method: curve_fit_lm
      refiner_p0_noise: normal
      refiner_p0_noise_kwargs:
        loc: 0.0
        scale: 5
      length_penalty: 0.05
      constants_penalty: 0.0
      likelihood_penalty: 0.0
      prune_constant_budget: 0
      generation_config:
        method: softmax_sampling
        kwargs:
          choices: 32
          top_k: 0
          top_p: 1
          max_len: 64
          batch_size: 128
          temperature: 1
          valid_only: true
          simplify: true
          unique: true
      device: cuda
    complexity: none
    device: cuda
    generation_overrides:
      kwargs:
        choices: !sweep
          name: ladder
          values: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048, 4096, 8192, 16384, 65536, 262144]
  runner:
    limit: null
    save_every: 64
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_00001.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_00002.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_00004.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_00008.pkl',
        '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_00016.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_00032.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_00064.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_00128.pkl',
        '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_00256.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_00512.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_01024.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_02048.pkl',
        '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_04096.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_08192.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_16384.pkl', '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_65536.pkl',
        '{{ROOT}}/results/evaluation/scaling/v23.0-3M/fastsrb/choices_262144.pkl']
