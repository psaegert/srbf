run:
  data_source:
    catalog: fastsrb
    sampling:
      n_support: 512
      n_validation: 512
      noise: 0.0
      problems_per_expression: !sweep
        name: ladder
        values: [10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 5, 5]
  model_adapter:
    config_provenance: upstream_default
    type: e2e
    model_path: '{{ROOT}}/models/e2e/model1.pt'
    simplipy_engine: dev_7-3
    device: cuda
    candidates_per_bag: !sweep
      name: ladder
      values: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048, 8192, 32768]
    max_input_points: 200
    max_number_bags: 100
    n_trees_to_refine: 10
    rescale: true
    max_generated_output_len: !sweep
      name: ladder
      values: [200, 200, 200, 200, 200, 200, 200, 200, 200, 195, 97, 48, 12, 3]
  runner:
    limit: null
    save_every: 16
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_00001.pkl', '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_00002.pkl', '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_00004.pkl',
        '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_00008.pkl', '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_00016.pkl', '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_00032.pkl',
        '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_00064.pkl', '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_00128.pkl', '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_00256.pkl',
        '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_00512.pkl', '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_01024.pkl', '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_02048.pkl',
        '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_08192.pkl', '{{ROOT}}/results/evaluation/scaling/e2e/fastsrb/candidates_per_bag_32768.pkl']
