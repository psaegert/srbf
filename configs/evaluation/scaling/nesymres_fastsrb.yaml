run:
  data_source:
    catalog: fastsrb
    sampling:
      n_support: 512
      n_validation: 512
      noise: 0.0
      problems_per_expression: !sweep
        name: ladder
        values: [10, 10, 10, 10, 10, 10, 5, 5]
  model_adapter:
    config_provenance: upstream_default
    type: nesymres
    eq_setting_path: '{{ROOT}}/models/nesymres/eq_setting.json'
    config_path: '{{ROOT}}/models/nesymres/config.yaml'
    weights_path: '{{ROOT}}/models/nesymres/100M.ckpt'
    simplipy_engine: dev_7-3
    n_restarts: 4
    device: cuda
    remove_padding: true
    beam_width: !sweep
      name: ladder
      values: [1, 2, 4, 8, 16, 32, 128, 512]
  runner:
    limit: null
    save_every: 32
    resume: true
    output: !sweep
      name: ladder
      values: ['{{ROOT}}/results/evaluation/scaling/nesymres/fastsrb/beam_width_00001.pkl', '{{ROOT}}/results/evaluation/scaling/nesymres/fastsrb/beam_width_00002.pkl', '{{ROOT}}/results/evaluation/scaling/nesymres/fastsrb/beam_width_00004.pkl',
        '{{ROOT}}/results/evaluation/scaling/nesymres/fastsrb/beam_width_00008.pkl', '{{ROOT}}/results/evaluation/scaling/nesymres/fastsrb/beam_width_00016.pkl', '{{ROOT}}/results/evaluation/scaling/nesymres/fastsrb/beam_width_00032.pkl', '{{ROOT}}/results/evaluation/scaling/nesymres/fastsrb/beam_width_00128.pkl',
        '{{ROOT}}/results/evaluation/scaling/nesymres/fastsrb/beam_width_00512.pkl']
