name: deploy-results-site

# Test-gated Pages deploy: the functionality suite (Playwright, desktop + mobile) and the
# copy lint must pass against the exact artifact before it ships. Replaces the legacy
# gh-pages-branch builder (retired 2026-07-03 after repeated multi-hour hangs).
on:
  push:
    branches: [main]
    paths: ["results-site/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Copy lint (viewer-facing wording)
        run: python3 results-site/tests/copy_lint.py
      - name: Install Playwright
        working-directory: results-site/tests
        run: |
          npm install --no-fund --no-audit
          npx playwright install --with-deps chromium
      - name: Functionality suite (desktop + mobile)
        working-directory: results-site/tests
        run: npx playwright test --config playwright.config.mjs

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: results-site
      - id: deployment
        uses: actions/deploy-pages@v4
