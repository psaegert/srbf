on:
  push:
    branches: main
  pull_request:

name: pytest

# srbf depends one-way on flash-ansr (>=0.6, published on PyPI). `pip install -e .` resolves the
# `flash-ansr~=0.6` pin and the runtime deps from PyPI; pytest is added separately. The heavy optional
# baselines (PySR/Julia, sympy for E2E/NeSymReS) are kept OUT of CI: the eval tests mock or skip those
# adapter paths. Some eval tests need provisioned assets (models, skeleton-pool fixtures) under
# FLASH_ANSR_ROOT and skip when absent.

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6.0.1

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install srbf + test deps (resolves flash-ansr>=0.10 + runtime deps from PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[analysis]'
          pip install pytest pytest-cov

      - name: Fetch FastSRB benchmark
        run: |
          mkdir -p data/ansr-data/test_set/fastsrb
          curl -L "https://raw.githubusercontent.com/viktmar/FastSRB/main/src/expressions.yaml" \
            -o data/ansr-data/test_set/fastsrb/expressions.yaml

      - name: Run tests
        env:
          FLASH_ANSR_ROOT: ${{ github.workspace }}
        run: |
          pytest tests
